name: LinkedIn Bot Workflow

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-draft, trigger-publish]

jobs:
  draft-posts:
    runs-on: ubuntu-latest
    environment: ${{ vars.ENVIRONMENT_STAGE || 'production' }}
    if: github.event_name != 'repository_dispatch' || github.event.action == 'trigger-draft'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Draft Script
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || secrets.GOOGLE_SHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID || secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON || vars.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_MODEL: ${{ github.event.client_payload.google_model || vars.GOOGLE_MODEL || secrets.GOOGLE_MODEL || 'gemini-1.5-flash' }}
          VERTEX_AI_SEARCH_PROJECT_ID: ${{ secrets.VERTEX_AI_SEARCH_PROJECT_ID || vars.VERTEX_AI_SEARCH_PROJECT_ID }}
          VERTEX_AI_SEARCH_LOCATION: ${{ secrets.VERTEX_AI_SEARCH_LOCATION || vars.VERTEX_AI_SEARCH_LOCATION }}
          VERTEX_AI_SEARCH_ENGINE_ID: ${{ secrets.VERTEX_AI_SEARCH_ENGINE_ID || vars.VERTEX_AI_SEARCH_ENGINE_ID }}
          VERTEX_AI_SEARCH_SERVING_CONFIG: ${{ secrets.VERTEX_AI_SEARCH_SERVING_CONFIG || vars.VERTEX_AI_SEARCH_SERVING_CONFIG }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN || vars.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ vars.LINKEDIN_PERSON_URN || secrets.LINKEDIN_PERSON_URN }}
          DRAFT_MODE: ${{ github.event.client_payload.draft_mode || '' }}
          TARGET_TOPIC: ${{ github.event.client_payload.target_topic || '' }}
          TARGET_DATE: ${{ github.event.client_payload.target_date || '' }}
          REFINE_TOPIC: ${{ github.event.client_payload.refine_topic || '' }}
          REFINE_DATE: ${{ github.event.client_payload.refine_date || '' }}
          REFINE_BASE_TEXT: ${{ github.event.client_payload.refine_base_text || '' }}
          REFINE_INSTRUCTIONS: ${{ github.event.client_payload.refine_instructions || '' }}
        run: python linkedin_bot.py draft

  publish-posts:
    runs-on: ubuntu-latest
    environment: ${{ vars.ENVIRONMENT_STAGE || 'production' }}
    if: github.event_name != 'repository_dispatch' || github.event.action == 'trigger-publish'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Publish Script
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || secrets.GOOGLE_SHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID || secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON || vars.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_MODEL: ${{ github.event.client_payload.google_model || vars.GOOGLE_MODEL || secrets.GOOGLE_MODEL || 'gemini-1.5-flash' }}
          VERTEX_AI_SEARCH_PROJECT_ID: ${{ secrets.VERTEX_AI_SEARCH_PROJECT_ID || vars.VERTEX_AI_SEARCH_PROJECT_ID }}
          VERTEX_AI_SEARCH_LOCATION: ${{ secrets.VERTEX_AI_SEARCH_LOCATION || vars.VERTEX_AI_SEARCH_LOCATION }}
          VERTEX_AI_SEARCH_ENGINE_ID: ${{ secrets.VERTEX_AI_SEARCH_ENGINE_ID || vars.VERTEX_AI_SEARCH_ENGINE_ID }}
          VERTEX_AI_SEARCH_SERVING_CONFIG: ${{ secrets.VERTEX_AI_SEARCH_SERVING_CONFIG || vars.VERTEX_AI_SEARCH_SERVING_CONFIG }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN || vars.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ vars.LINKEDIN_PERSON_URN || secrets.LINKEDIN_PERSON_URN }}
          GOOGLE_DOC_ID: ${{ vars.GOOGLE_DOC_ID || secrets.GOOGLE_DOC_ID }}
          TARGET_TOPIC: ${{ github.event.client_payload.target_topic || '' }}
          TARGET_DATE: ${{ github.event.client_payload.target_date || '' }}
        run: python linkedin_bot.py publish