name: LinkedIn Bot Workflow

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-draft, trigger-publish]

jobs:
  draft-posts:
    runs-on: ubuntu-latest
    environment: ${{ vars.ENVIRONMENT_STAGE || 'production' }}
    if: github.event_name != 'repository_dispatch' || github.event.action == 'trigger-draft'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Draft Script
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || secrets.GOOGLE_SHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID || secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON || vars.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_MODEL: ${{ github.event.client_payload.google_model || vars.GOOGLE_MODEL || secrets.GOOGLE_MODEL || 'gemini-1.5-flash' }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY || vars.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ vars.GOOGLE_SEARCH_CX || secrets.GOOGLE_SEARCH_CX }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN || vars.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ vars.LINKEDIN_PERSON_URN || secrets.LINKEDIN_PERSON_URN }}
        run: python linkedin_bot.py draft

  publish-posts:
    runs-on: ubuntu-latest
    environment: ${{ vars.ENVIRONMENT_STAGE || 'production' }}
    if: github.event_name != 'repository_dispatch' || github.event.action == 'trigger-publish'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Publish Script
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || secrets.GOOGLE_SHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID || secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON || vars.GOOGLE_CREDENTIALS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_MODEL: ${{ github.event.client_payload.google_model || vars.GOOGLE_MODEL || secrets.GOOGLE_MODEL || 'gemini-1.5-flash' }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY || vars.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ vars.GOOGLE_SEARCH_CX || secrets.GOOGLE_SEARCH_CX }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN || vars.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ vars.LINKEDIN_PERSON_URN || secrets.LINKEDIN_PERSON_URN }}
          GOOGLE_DOC_ID: ${{ vars.GOOGLE_DOC_ID || secrets.GOOGLE_DOC_ID }}
        run: python linkedin_bot.py publish